<style>

@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Orbitron:wght@600;700;800&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html,body{
width:100%;
height:100%;
overflow-x:hidden;
background:#020813;
color:#e2e8f0;
font-family:'Tajawal',sans-serif;
}

body{
display:flex;
flex-direction:column;
background:
radial-gradient(circle at top,#071425 0%,#020813 45%);
}

/* HEADER */

.hdr{
height:68px;
padding:0 14px;
display:flex;
align-items:center;
justify-content:space-between;
border-bottom:1px solid rgba(56,189,248,.12);
background:rgba(2,8,20,.96);
backdrop-filter:blur(10px);
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.eye{
width:30px;
height:15px;
border:1.7px solid #38bdf8;
border-radius:50%;
position:relative;
box-shadow:0 0 16px rgba(56,189,248,.45);
}

.eye::after{
content:'';
position:absolute;
width:8px;
height:8px;
background:#38bdf8;
border-radius:50%;
top:50%;
left:50%;
transform:translate(-50%,-50%);
box-shadow:0 0 12px #38bdf8;
}

.ln{
font-family:'Orbitron',sans-serif;
font-size:16px;
font-weight:800;
letter-spacing:3px;
color:#38bdf8;
}

.ls{
font-size:11px;
color:#64748b;
margin-top:2px;
}

.hr{
display:flex;
align-items:center;
gap:10px;
}

.live{
display:flex;
align-items:center;
gap:6px;
font-size:13px;
color:#34d399;
font-weight:700;
}

.dot{
width:7px;
height:7px;
border-radius:50%;
background:#34d399;
box-shadow:0 0 10px #34d399;
}

.btn{
height:38px;
padding:0 14px;
border-radius:10px;
border:1px solid rgba(56,189,248,.25);
background:rgba(56,189,248,.08);
color:#38bdf8;
font-weight:700;
font-size:13px;
}

/* NEWS */

.news{
height:38px;
overflow:hidden;
border-bottom:1px solid rgba(56,189,248,.08);
background:rgba(56,189,248,.03);
display:flex;
align-items:center;
}

.news-inner{
display:flex;
white-space:nowrap;
animation:scroll-l 45s linear infinite;
}

.ni{
display:inline-flex;
align-items:center;
gap:8px;
padding:0 18px;
font-size:13px;
color:#cbd5e1;
}

.nd{
width:5px;
height:5px;
background:#38bdf8;
border-radius:50%;
}

@keyframes scroll-l{
0%{transform:translateX(0)}
100%{transform:translateX(-50%)}
}

/* CONTENT */

.cnt{
flex:1;
overflow-y:auto;
padding:10px;
display:flex;
flex-direction:column;
gap:10px;
}

/* PRICES */

.prices{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.pc{
background:
linear-gradient(180deg,#071325,#06101f);
border:1px solid rgba(56,189,248,.12);
border-radius:18px;
padding:16px 12px;
position:relative;
overflow:hidden;
box-shadow:
0 0 25px rgba(0,0,0,.35),
inset 0 0 25px rgba(56,189,248,.03);
}

.pc::before{
content:'';
position:absolute;
top:0;
left:0;
right:0;
height:1px;
background:linear-gradient(90deg,transparent,#38bdf8,transparent);
opacity:.4;
}

.ps{
font-size:13px;
color:#64748b;
margin-bottom:8px;
font-weight:700;
}

.pv{
font-family:'Orbitron',sans-serif;
font-size:30px;
font-weight:800;
color:#38bdf8;
}

.pch{
margin-top:8px;
font-size:14px;
font-weight:800;
}

.up{
color:#34d399;
}

.dn{
color:#f87171;
}

/* CHART */

.chart-box{
background:
linear-gradient(180deg,#071325,#06101f);
border:1px solid rgba(56,189,248,.12);
border-radius:20px;
padding:10px;
box-shadow:0 0 25px rgba(0,0,0,.35);
}

.chart-head{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
padding:0 4px;
}

.chart-title{
font-size:14px;
font-weight:800;
color:#38bdf8;
}

.chart-sub{
font-size:12px;
color:#64748b;
}

.tv{
height:270px;
border-radius:14px;
overflow:hidden;
border:1px solid rgba(255,255,255,.05);
}

/* FLOW */

.flow{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:8px;
margin-top:10px;
}

.flow div{
background:rgba(255,255,255,.03);
border-radius:12px;
padding:10px 6px;
text-align:center;
font-size:13px;
font-weight:700;
}

.flow span{
display:block;
margin-top:5px;
font-size:18px;
font-family:'Orbitron',sans-serif;
}

.demand{
color:#34d399;
}

.supply{
color:#f87171;
}

.volume{
color:#38bdf8;
}

/* ANALYSIS */

.analysis-box{
background:
linear-gradient(180deg,#071325,#06101f);
border:1px solid rgba(56,189,248,.12);
border-radius:20px;
padding:12px;
box-shadow:0 0 25px rgba(0,0,0,.35);
}

.analysis-head{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.analysis-title{
font-size:15px;
font-weight:800;
color:#38bdf8;
}

.analysis-live{
font-size:12px;
color:#34d399;
font-weight:800;
}

.feed{
display:flex;
flex-direction:column;
gap:10px;
max-height:340px;
overflow:auto;
}

.feed::-webkit-scrollbar{
display:none;
}

.feed-item{
background:rgba(255,255,255,.03);
border-radius:16px;
padding:14px;
position:relative;
border-right:4px solid #38bdf8;
}

.feed-item.red{
border-right-color:#f87171;
}

.feed-item.green{
border-right-color:#34d399;
}

.feed-item.orange{
border-right-color:#f59e0b;
}

.feed-item.blue{
border-right-color:#38bdf8;
}

.feed-time{
font-size:11px;
color:#64748b;
margin-bottom:8px;
}

.feed-text{
font-size:15px;
line-height:1.9;
color:#f1f5f9;
font-weight:600;
}

/* WHALES */

.whale-box{
background:
linear-gradient(180deg,#071325,#06101f);
border:1px solid rgba(56,189,248,.12);
border-radius:20px;
padding:12px;
box-shadow:0 0 25px rgba(0,0,0,.35);
}

.whale-title{
font-size:15px;
font-weight:800;
color:#38bdf8;
margin-bottom:10px;
}

.whale-feed{
display:flex;
flex-direction:column;
gap:8px;
}

.whale-item{
background:rgba(255,255,255,.03);
padding:12px;
border-radius:14px;
font-size:14px;
line-height:1.7;
}

.whale-usd{
font-family:'Orbitron',sans-serif;
color:#38bdf8;
font-size:18px;
font-weight:800;
margin-bottom:4px;
}

</style>
