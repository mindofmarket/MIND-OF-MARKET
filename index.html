<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MIND OF MARKET</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>

<style>

body{
background:#020810;
color:white;
font-family:Arial;
margin:0;
text-align:center;
}

header{
padding:20px;
font-size:30px;
font-weight:bold;
background:#07111f;
}

.box{
background:#101a2f;
width:90%;
margin:20px auto;
padding:20px;
border-radius:12px;
}

canvas{
max-width:100%;
}

</style>

</head>



<body>


<header>

🐋 MIND OF MARKET

</header>



<div class="box">

Fear & Greed :
<span id="fear">Loading...</span>

</div>



<div class="box">

Whale Score :
<span id="score">Loading...</span>

</div>



<div class="box">

<div id="analysis">

Loading analysis...

</div>

</div>



<div class="box">

<canvas id="chart"></canvas>

</div>



<div class="box" id="whales">

Loading whale movements...

</div>





<script>


const ARKHAM_KEY =
window.ENV?.ARKHAM_KEY || "";


const ANTHROPIC_KEY =
window.ENV?.ANTHROPIC_KEY || "";



let chart;



function money(n){

n = Number(n||0);

if(n>=1e9) return "$"+(n/1e9).toFixed(2)+"B";

if(n>=1e6) return "$"+(n/1e6).toFixed(2)+"M";

return "$"+n.toFixed(0);

}




async function loadDashboard(){


try{


const fg =
await fetch(
"https://api.alternative.me/fng/"
);


const fgd =
await fg.json();


const fear =
fgd.data[0].value;


document.getElementById(
"fear"
).innerHTML = fear;




const ar =
await fetch(

"https://api.arkhamintelligence.com/transfers?usdGte=1000000&limit=20",

{

headers:{

"API-Key":
ARKHAM_KEY

}

}

);



const ad =
await ar.json();



const transfers =
ad.transfers || [];



const labels =
transfers.slice(0,6).map(
x=>x.tokenSymbol
);


const values =
transfers.slice(0,6).map(
x=>x.historicalUSD
);




if(chart){

chart.destroy();

}




chart =
new Chart(

document.getElementById(
"chart"
),

{

type:"bar",

data:{

labels,

datasets:[{

data:values

}]

}

}

);





document.getElementById(
"whales"
).innerHTML =

transfers.slice(0,5).map(

t=>`

<div style='padding:10px'>

🐋 ${money(
t.historicalUSD
)}

<br>

${t.tokenSymbol}

</div>

`

).join("");





let score = 5;
let text = "محايد";


if(fear < 30){

score = 8;
text = "فرصة تراكم";

}


if(fear > 70){

score = 8;
text = "احذر من التصريف";

}



document.getElementById(
"score"
).innerHTML =
score+"/10";


document.getElementById(
"analysis"
).innerHTML =
text;



}


catch(e){

console.log(e);

}



}



loadDashboard();


setInterval(

loadDashboard,

15000

);



</script>



</body>

</html>
