<!DOCTYPE html>
<html>
<head>
<title>MIND OF MARKET</title>

<style>
body{
background:#0b1020;
color:white;
font-family:Arial;
text-align:center;
}

h1{
margin-top:40px;
}

.box{
background:#151c33;
width:80%;
margin:20px auto;
padding:20px;
border-radius:12px;
font-size:22px;
}
</style>

</head>

<body>

<h1>🐋 MIND OF MARKET</h1>

<div class="box">
Whale Intelligence Dashboard
</div>

<div class="box" id="whale">
Loading whale activity...
</div>

<script>

const alerts = [
"🐋 1,250 BTC moved to Binance",
"🐋 8,500 ETH moved to unknown wallet",
"🐋 25M USDT minted",
"🐋 900 BTC withdrawn from Coinbase"
];

let i = 0;

setInterval(()=>{
document.getElementById("whale").innerHTML = alerts[i];
i = (i+1)%alerts.length;
},2000);

</script>
