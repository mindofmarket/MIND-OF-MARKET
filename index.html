<!DOCTYPE html>
<html lang="ar" dir="rtl" id="root">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIND OF MARKET</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Orbitron:wght@700;900&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#030b14;
color:#e2e8f0;
font-family:'Tajawal',sans-serif;
padding:10px;
}

.hdr{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.logo{
display:flex;
flex-direction:column;
}

.ln{
font-family:'Orbitron',sans-serif;
font-size:18px;
font-weight:900;
color:#38bdf8;
}

.ls{
font-size:11px;
color:#64748b;
}

.right{
display:flex;
align-items:center;
gap:8px;
}

.live{
font-size:11px;
color:#34d399;
}

.lang-btn{
background:#111827;
border:1px solid rgba(56,189,248,0.2);
color:#38bdf8;
padding:6px 10px;
border-radius:8px;
cursor:pointer;
font-size:11px;
}

.prices{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:6px;
margin-bottom:10px;
}

.pc{
background:#0f172a;
padding:10px;
border-radius:12px;
border:1px solid rgba(56,189,248,0.08);
text-align:center;
}

.ps{
font-size:10px;
color:#64748b;
margin-bottom:4px;
}

.pv{
font-family:'Orbitron',sans-serif;
font-size:15px;
font-weight:700;
color:#38bdf8;
}

.pch{
font-size:11px;
margin-top:4px;
font-weight:700;
}

.up{
color:#34d399;
}

.dn{
color:#f87171;
}

.chart-box{
background:#0f172a;
border:1px solid rgba(56,189,248,0.08);
border-radius:12px;
padding:10px;
margin-bottom:10px;
}

.chart-head{
display:flex;
justify-content:space-between;
margin-bottom:8px;
font-size:12px;
color:#38bdf8;
font-weight:700;
}

canvas{
width:100%;
height:160px;
background:#111827;
border-radius:10px;
}

.sd-row{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:6px;
margin-top:10px;
}

.sd{
background:#111827;
padding:8px;
border-radius:8px;
text-align:center;
font-size:11px;
}

.demand{
color:#34d399;
}

.supply{
color:#f87171;
}

.volume{
color:#38bdf8;
}

.indicators{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:6px;
margin-bottom:10px;
}

.ind{
background:#0f172a;
padding:10px;
border-radius:12px;
border:1px solid rgba(56,189,248,0.08);
text-align:center;
}

.il{
font-size:10px;
color:#64748b;
margin-bottom:5px;
}

.iv{
font-family:'Orbitron',sans-serif;
font-size:18px;
font-weight:900;
}

.id{
font-size:10px;
margin-top:5px;
color:#94a3b8;
}

.whales{
background:#0f172a;
padding:10px;
border-radius:12px;
border:1px solid rgba(56,189,248,0.08);
margin-bottom:10px;
}

.wht{
font-size:12px;
font-weight:700;
color:#38bdf8;
margin-bottom:10px;
}

.wi{
background:#111827;
padding:10px;
border-radius:10px;
margin-bottom:6px;
border:1px solid rgba(255,255,255,0.04);
}

.wa{
font-family:'Orbitron',sans-serif;
font-size:15px;
font-weight:700;
color:#38bdf8;
margin-bottom:5px;
}

.wroute{
font-size:11px;
margin-bottom:4px;
}

.wbot{
display:flex;
justify-content:space-between;
font-size:10px;
color:#94a3b8;
}

.green{
color:#34d399;
}

.red{
color:#f87171;
}

.yellow{
color:#fbbf24;
}

.dec{
padding:12px;
border-radius:12px;
text-align:center;
font-size:14px;
font-weight:700;
margin-bottom:10px;
}

.dg{
background:rgba(52,211,153,0.1);
color:#34d399;
border:1px solid rgba(52,211,153,0.2);
}

.dc{
background:rgba(248,113,113,0.1);
color:#f87171;
border:1px solid rgba(248,113,113,0.2);
}

.dw{
background:rgba(251,191,36,0.1);
color:#fbbf24;
border:1px solid rgba(251,191,36,0.2);
}

footer{
text-align:center;
margin-top:10px;
font-size:10px;
color:#475569;
}

</style>
</head>

<body>

<div class="hdr">

<div class="logo">
<div class="ln">MIND OF MARKET</div>
<div class="ls" id="subTitle">رادار الحيتان</div>
</div>

<div class="right">
<div class="live">● LIVE</div>
<button class="lang-btn" onclick="toggleLang()">EN / AR</button>
</div>

</div>

<div class="prices">

<div class="pc">
<div class="ps">BTC</div>
<div class="pv" id="p-btc">--</div>
<div class="pch" id="c-btc">--</div>
</div>

<div class="pc">
<div class="ps">ETH</div>
<div class="pv" id="p-eth">--</div>
<div class="pch" id="c-eth">--</div>
</div>

<div class="pc">
<div class="ps">SOL</div>
<div class="pv" id="p-sol">--</div>
<div class="pch" id="c-sol">--</div>
</div>

<div class="pc">
<div class="ps">BNB</div>
<div class="pv" id="p-bnb">--</div>
<div class="pch" id="c-bnb">--</div>
</div>

</div>

<div class="chart-box">

<div class="chart-head">
<div id="chartTitle">حركة السوق</div>
<div>BTC / 15m</div>
</div>

<canvas id="marketChart" width="800" height="160"></canvas>

<div class="sd-row">

<div class="sd demand">
طلب
<div id="buyPressure">68%</div>
</div>

<div class="sd supply">
عرض
<div id="sellPressure">32%</div>
</div>

<div class="sd volume">
Volume
<div id="volumeVal">$2.4B</div>
</div>

</div>

</div>

<div class="indicators">

<div class="ind">
<div class="il">Whale Score</div>
<div class="iv" id="whaleScore">--</div>
<div class="id">Smart Money</div>
</div>

<div class="ind">
<div class="il">Funding</div>
<div class="iv" id="fundingRate">--</div>
<div class="id">Funding Rate</div>
</div>

<div class="ind">
<div class="il">Open Interest</div>
<div class="iv" id="openInterest">--</div>
<div class="id">OI</div>
</div>

</div>

<div class="whales">

<div class="wht" id="whaleTitle">أهم تحركات الحيتان</div>

<div id="whaleList"></div>

</div>

<div class="dec dw" id="decisionBox">
جاري التحليل...
</div>

<footer>
MIND OF MARKET ©
</footer>

<script>

const DATA_URL='./data.json';

let currentLang='ar';

function toggleLang(){

const root=document.getElementById('root');

if(currentLang==='ar'){
currentLang='en';
root.setAttribute('dir','ltr');
root.setAttribute('lang','en');
document.getElementById('subTitle').textContent='Whale Radar';
document.getElementById('chartTitle').textContent='Market Movement';
document.getElementById('whaleTitle').textContent='Top Whale Transfers';
}else{
currentLang='ar';
root.setAttribute('dir','rtl');
root.setAttribute('lang','ar');
document.getElementById('subTitle').textContent='رادار الحيتان';
document.getElementById('chartTitle').textContent='حركة السوق';
document.getElementById('whaleTitle').textContent='أهم تحركات الحيتان';
}

}

function formatMoney(num){

const n=parseFloat(num);

if(n>=1000000000){
return '$'+(n/1000000000).toFixed(2)+'B';
}

if(n>=1000000){
return '$'+(n/1000000).toFixed(2)+'M';
}

if(n>=1000){
return '$'+(n/1000).toFixed(1)+'K';
}

return '$'+n.toFixed(0);

}

async function loadData(){

try{

const res=await fetch(DATA_URL+'?v='+Date.now());

const data=await res.json();

document.getElementById('p-btc').textContent='$'+parseFloat(data.prices.btc.price).toLocaleString();
document.getElementById('p-eth').textContent='$'+parseFloat(data.prices.eth.price).toLocaleString();
document.getElementById('p-sol').textContent='$'+parseFloat(data.prices.sol.price).toLocaleString();
document.getElementById('p-bnb').textContent='$'+parseFloat(data.prices.bnb.price).toLocaleString();

document.getElementById('c-btc').textContent=data.prices.btc.change+'%';
document.getElementById('c-eth').textContent=data.prices.eth.change+'%';
document.getElementById('c-sol').textContent=data.prices.sol.change+'%';
document.getElementById('c-bnb').textContent=data.prices.bnb.change+'%';

document.getElementById('whaleScore').textContent=data.whale_score;

document.getElementById('fundingRate').textContent=data.market.funding;

document.getElementById('openInterest').textContent=formatMoney(data.market.open_interest);

document.getElementById('buyPressure').textContent=data.market.buy_pressure+'%';

document.getElementById('sellPressure').textContent=data.market.sell_pressure+'%';

document.getElementById('volumeVal').textContent=formatMoney(data.market.volume);

document.getElementById('decisionBox').textContent=data.analysis;

if(data.analysis.includes('شراء')||data.analysis.includes('تراكم')){
document.getElementById('decisionBox').className='dec dg';
}else if(data.analysis.includes('حذر')||data.analysis.includes('بيع')){
document.getElementById('decisionBox').className='dec dc';
}else{
document.getElementById('decisionBox').className='dec dw';
}

let whales='';

data.transfers.forEach(t=>{

let color='yellow';

if(t.type==='تراكم'){
color='green';
}

if(t.type==='توزيع'){
color='red';
}

whales+=`
<div class="wi">

<div class="wa">
${formatMoney(t.amount)}
</div>

<div class="wroute">
${t.from || 'مجهول'} ← ${t.to || 'مجهول'}
</div>

<div class="wbot">
<div>${t.symbol}</div>
<div class="${color}">${t.type}</div>
</div>

</div>
`;

});

document.getElementById('whaleList').innerHTML=whales;

drawChart(data.line_chart['1h']);

}catch(e){

console.log(e);

}

}

function drawChart(arr){

const canvas=document.getElementById('marketChart');

const ctx=canvas.getContext('2d');

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.beginPath();

ctx.strokeStyle='#38bdf8';
ctx.lineWidth=3;

const max=Math.max(...arr);
const min=Math.min(...arr);

arr.forEach((v,i)=>{

const x=(canvas.width/(arr.length-1))*i;

const y=canvas.height-((v-min)/(max-min))*130-15;

if(i===0){
ctx.moveTo(x,y);
}else{
ctx.lineTo(x,y);
}

});

ctx.stroke();

}

loadData();

setInterval(loadData,15000);

</script>

</body>
</html>
